apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${WORKLOAD_NAME}-config-watcher
  namespace: ${NAMESPACE}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    resourceNames: ["${WORKLOAD_NAME}"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["${WORKLOAD_NAME}"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${WORKLOAD_NAME}-config-watcher
  namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${WORKLOAD_NAME}-config-watcher
subjects:
  - kind: ServiceAccount
    name: ${WORKLOAD_NAME}
    namespace: ${NAMESPACE}
